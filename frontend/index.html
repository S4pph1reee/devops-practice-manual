<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DevOps Practice</title>
        <style>
            body { font-family: system-ui, sans-serif; text-align: center; margin: 60px 20px; background: #f8f9fa; }
            button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #0d6efd; color: white; border: none; border-radius: 6px; }
            button:hover { background: #0b5ed7; }
            #response { margin-top: 20px; padding: 15px; background: white; border: 1px solid #ddd; border-radius: 8px; display: inline-block; min-width: 300px; }
            .error { color: #dc3545; }
        </style>
    </head>
    <body>
        <h1>🛠️ Ручной деплой: этапы и практика</h1>
        <button id="fetchBtn">Запросить данные с бэкенда</button>
        <div id="response">Нажми кнопку для теста...</div>

        <script>
            document.getElementById('fetchBtn').addEventListener('click', async () => {
            const resDiv = document.getElementById('response');
            resDiv.textContent = '⏳ Загрузка...';
            try {
             const response = await fetch('/api/hello');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                resDiv.textContent = `${data.message}\n⏱ ${data.timestamp}`;
            } catch (err) {
                resDiv.innerHTML = `<span class="error">❌ Ошибка: ${err.message}</span>`;
            }
            });
        </script>
    </body>
</html>
